<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      {{myname}}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<ion-card>
  <ion-card-header>
    <ion-card-title>Добавить новый курс</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-item>
      <ion-label position="floating">Название курса</ion-label>
      <ion-input [(ngModel)]="newTelegramName" placeholder="Введите название"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Автор</ion-label>
      <ion-input [(ngModel)]="newAuthorName" placeholder="Введите автора"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Цена</ion-label>
      <ion-input [(ngModel)]="newPrice" type="number" placeholder="Введите цену"></ion-input>
    </ion-item>
    <ion-button expand="block" color="primary" (click)="addBook()">Забайтиться</ion-button>
  </ion-card-content>
</ion-card>


<ion-card>
  <ion-card-header>
    <ion-card-title>Список курсов</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-grid>
      <ion-row>
        <ion-col>Название курса</ion-col>
        <ion-col>Автор</ion-col>
        <ion-col>Цена</ion-col>
        <ion-col>Действие</ion-col>
      </ion-row>
      <ion-row *ngFor="let element of books; let i = index">
        <ion-col>{{element.telegramname}}</ion-col>
        <ion-col>{{element.authorname}}</ion-col>
        <ion-col>{{element.price}}</ion-col>
        <ion-col>
          <ion-button color="danger" size="small" (click)="deleteBook(i)">Удалить</ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-card-content>
</ion-card>
</ion-content>
